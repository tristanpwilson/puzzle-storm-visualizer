<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Storm Visualizer</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/chart.min.js"></script>
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>-->
</head>
  <body>

    <div class="header">
      <span class="icon-header">♔</span>
      <h1>Lichess <span class="color-beige">Puzzle Storm</span> Visualizer</h1>
    </div>



      <div class="search-container">
        <label for="username" class="label">Username</label>
        <div class="search-row">
          <input type="text" id="username" placeholder="" value="srirachachacha" autocomplete="off" />
          <button id="fetchBtn" class="bg-beige-dark color-white" onclick="fetchData()">Analyze</button>
        </div>
      </div>
    <div class="error" id="error"></div>

    <div id="statsRow" class="stats-row hidden"></div>

    <div id="mainPanel" class="hidden">

      <div class="controls">

        <div class="range-btns">
          <button class="range-btn" onclick="setRange(90); renderChart()">3M</button>
          <button class="range-btn" onclick="setRange(180); renderChart()">6M</button>
          <button class="range-btn" onclick="setRange(365); renderChart()">1Y</button>
          <button class="range-btn" onclick="setRange(null); renderChart()">All</button>
        </div>

        <label class="label">From <input type="date" id="dateFrom" onchange="renderChart()"></label>
        <label class="label">To <input type="date" id="dateTo" onchange="renderChart()"></label>


        <div class="smooth-btns">
          <div class="container-dropdown">
            <select class="dropdown" name="smoothDropdown" onchange="setSmoothing(Number(this.value), this)">
              <option class="smooth-btn active" value="1" selected>Daily</option>
              <option class="smooth-btn" value="7">7 Day Avg</option>
              <option class="smooth-btn" value="30">30 Day Avg</option>
            </select>
          </div>
        </div>
        
        <!--<div class="smooth-btns">
          <button class="smooth-btn color-beige bg-beige-med active" onclick="setSmoothing(1, this)">Daily</button>
          <button class="smooth-btn color-beige-desat bg-beige-dark" onclick="setSmoothing(7, this)">7D Avg</button>
          <button class="smooth-btn color-beige-desat bg-beige-dark" onclick="setSmoothing(30, this)">30D Avg</button>
        </div>-->

        <div class="metric-btns">
          <button class="metric-btn color-beige bg-beige-med active" onclick="setMetric('score', this)">Score</button>
          <button class="metric-btn color-beige-desat bg-beige-dark" onclick="setMetric('moves', this)">Moves</button>
          <button class="metric-btn color-beige-desat bg-beige-dark" onclick="setMetric('accuracy', this)">Accuracy</button>
          <button class="metric-btn color-beige-desat bg-beige-dark" onclick="setMetric('combo', this)">Combo</button>
        </div>

      </div>

      <div class="chart-wrap">
        <div class="loading" id="loadingEl"><div class="spinner"></div></div>
        <div class="empty" id="empty"><span class="big">📭</span><span>No data in selected range</span></div>
        <canvas id="chart"></canvas>
      </div>

    </div>

    <script>
    let allData = [];
    let chartInstance = null;
    let currentMetric = 'score';
    let currentSmoothing = 1;

    const metricConfig = {
      score:    { label: 'Best Score',   color: '#f0d9b5', key: d => d.score },
      moves:    { label: 'Moves',        color: '#5eead4', key: d => d.moves },
      accuracy: { label: 'Accuracy (%)', color: '#f9a8d4', key: d => d.accuracy },
      combo:    { label: 'Combo',        color: '#fbbf24', key: d => d.combo },
    };

    async function getStorm(username, days = 365) {
      const url = `https://lichess.org/api/storm/dashboard/${encodeURIComponent(username)}?days=${days}`;
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    async function fetchData() {
      const username = document.getElementById('username').value.trim();
      if (!username) return;

      const btn = document.getElementById('fetchBtn');
      const err = document.getElementById('error');
      const loading = document.getElementById('loadingEl');

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Loading…';
      document.getElementById('mainPanel').classList.add('hidden');
      document.getElementById('statsRow').classList.add('hidden');
      loading.style.display = 'flex';

      try {
        const json = await getStorm(username);
        const history = json.days;
        if (!history || history.length === 0) throw new Error('No Puzzle Storm data found for this user.');

        allData = history.map(d => {
          const [y, m, day] = d._id.split('/').map(Number);
          return {
            date: new Date(Date.UTC(y, m - 1, day)),
            score: d.score,
            moves: d.moves,
            accuracy: +((d.moves - d.errors) / d.moves * 100).toFixed(1),
            combo: d.combo,
            runs: d.runs,
          };
        }).sort((a, b) => a.date - b.date);

        renderStats(json.allTime ?? json);
        setRange(null);
        document.getElementById('statsRow').classList.remove('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        renderChart();
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
        loading.style.display = 'none';
      }
    }

    function renderStats(allTime) {
      const scores = allData.map(d => d.score);
      const best = Math.max(...scores);
      const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
      const totalRuns = allData.reduce((a, d) => a + d.runs, 0);
      const allTimeBest = allTime?.score ?? best;

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="label">All-time Best</div><div class="value color-beige">${allTimeBest}</div></div>
        <div class="stat-card"><div class="label">Best (shown)</div><div class="value color-white">${best}</div></div>
        <div class="stat-card"><div class="label">Avg Score</div><div class="value color-beige">${avg}</div></div>
        <div class="stat-card"><div class="label">Days Played</div><div class="value color-white">${allData.length}</div></div>
        <div class="stat-card"><div class="label">Total Runs</div><div class="value color-beige">${totalRuns}</div></div>
      `;
    }

    function setRange(days) {
      const btns = document.querySelectorAll('.range-btn');
      btns.forEach(b => b.classList.remove('active', 'color-beige', 'bg-beige-med'));
      btns.forEach(b => b.classList.add('color-beige-desat', 'bg-beige-dark'));
      const i = days === 90 ? 0 : days === 180 ? 1 : days === 365 ? 2 : 3;
      btns[i].classList.add('active', 'color-beige', 'bg-beige-med');
      btns[i].classList.remove('color-beige-desat', 'bg-beige-dark');
      const to = new Date();
      const from = days ? new Date(to - days * 86400000) : null;
      document.getElementById('dateFrom').value = from ? from.toISOString().split('T')[0] : '';
      document.getElementById('dateTo').value = '';
    }

    function setSmoothing(days, btn) {
      currentSmoothing = days;
      const btns = document.querySelectorAll('.smooth-btn');
      btns.forEach(b => { b.classList.remove('active'); });
      btn.classList.add('active');
      renderChart();
    }

    function applySmoothing(data, windowDays) {
      if (windowDays === 1 || data.length === 0) return data;
      const buckets = [];
      const origin = data[0].date.getTime();
      const bucketMs = windowDays * 86400000;
      let i = 0;
      while (i < data.length) {
        const bucketIndex = Math.floor((data[i].date.getTime() - origin) / bucketMs);
        const bucketEnd = origin + (bucketIndex + 1) * bucketMs;
        const group = [];
        while (i < data.length && data[i].date.getTime() < bucketEnd) {
          group.push(data[i]);
          i++;
        }
        const avg = v => +(group.reduce((sum, p) => sum + p[v], 0) / group.length).toFixed(1);
        buckets.push({
          date: group[group.length - 1].date,
          score: avg('score'),
          moves: avg('moves'),
          accuracy: avg('accuracy'),
          combo: avg('combo'),
          runs: group.reduce((sum, p) => sum + p.runs, 0),
        });
      }
      return buckets;
    }

    function setMetric(m, btn) {
      currentMetric = m;
      const metbtns = document.querySelectorAll('.metric-btn');
      metbtns.forEach(b => b.classList.remove('active', 'color-beige', 'bg-beige-med'));
      metbtns.forEach(b => b.classList.add('color-beige-desat', 'bg-beige-dark'));
      btn.classList.add('active', 'color-beige', 'bg-beige-med');
      btn.classList.remove('color-beige-desat', 'bg-beige-dark');
      renderChart();
    }

    function renderChart() {
      const fromVal = document.getElementById('dateFrom').value;
      const toVal = document.getElementById('dateTo').value;
      const from = fromVal ? new Date(fromVal) : null;
      const to = toVal ? new Date(toVal + 'T23:59:59') : null;

      const filtered = allData.filter(d => {
        if (from && d.date < from) return false;
        if (to && d.date > to) return false;
        return true;
      });

      const empty = document.getElementById('empty');
      const canvas = document.getElementById('chart');

      if (filtered.length === 0) {
        empty.style.display = 'flex';
        canvas.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      canvas.style.display = 'block';

      const cfg = metricConfig[currentMetric];
      const smoothed = applySmoothing(filtered, currentSmoothing);
      const labels = smoothed.map(d => d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }));
      const values = smoothed.map(cfg.key);

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: cfg.label,
            data: values,
            borderColor: cfg.color,
            backgroundColor: cfg.color + '22',
            borderWidth: 2.5,
            pointRadius: smoothed.length > 60 ? 2 : 5,
            pointHoverRadius: 7,
            pointBackgroundColor: cfg.color,
            fill: true,
            tension: 0.35,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1d27',
              borderColor: '#2e3350',
              borderWidth: 1,
              titleColor: '#e8eaf6',
              bodyColor: '#7b82a0',
              padding: 12,
              callbacks: {
                title: ctx => smoothed[ctx[0].dataIndex].date.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' }),
                label: ctx => {
                  const d = smoothed[ctx.dataIndex];
                  return [`  Score: ${d.score}`, `  Moves: ${d.moves}   Accuracy: ${d.accuracy}%`, `  Combo: ${d.combo}   Runs: ${d.runs}`];
                },
                labelColor: () => ({ borderColor: 'transparent', backgroundColor: 'transparent' }),
              }
            }
          },
          scales: {
            x: { grid: { color: '#2e335022' }, ticks: { color: '#7b82a0', maxTicksLimit: 10, font: { size: 11 } } },
            y: {
              grid: { color: '#2e335044' },
              ticks: { color: '#7b82a0', font: { size: 11 } },
              title: { display: true, text: cfg.label, color: '#7b82a0', font: { size: 11 } },
            }
          }
        }
      });
    }

    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchData();
    });

    window.addEventListener('load', () => fetchData());

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (chartInstance) renderChart(); }, 200);
    });

    </script>
  </body>
</html>
